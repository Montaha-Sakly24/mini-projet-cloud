name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        run: |
          echo "APP_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/mini-projet-cloud:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mini-projet-cloud:latest

      - name: Docker Compose up on runner
        env:
          APP_IMAGE: ${{ env.APP_IMAGE }}
        run: |
          docker pull "$APP_IMAGE"
          docker compose -f nginx/docker-compose.yml up -d --pull=always --no-build

          # Wait for nginx to serve the API
          for i in $(seq 1 20); do
            if curl -kfsS https://localhost:8443/tasks > /dev/null; then
              echo "API is up"
              break
            fi
            sleep 2
          done

          curl -kfsS https://localhost:8443/tasks
          docker compose -f nginx/docker-compose.yml ps

      - name: Cleanup
        if: always()
        run: docker compose -f nginx/docker-compose.yml down -v
